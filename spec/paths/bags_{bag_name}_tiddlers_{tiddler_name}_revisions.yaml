get:
  summary: Get revisions list for a tiddler from a bag
  operationId: getBagTiddlerRevisions
  parameters:
    - name: bag_name
      in: path
      required: true
      schema:
        type: string
    - name: tiddler_name
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: List of tiddler revisions
      content:
        text/plain:
          schema:
            type: string
            description: Newline-separated list of "title:revision" pairs (e.g. "TestOne:1\nTestTwo:2\nTestThree:3")
        text/html:
          schema:
            type: string
        application/vnd.tiddlyweb+json:
          schema:
            type: array
            items:
              type: object
              properties:
                revision:
                  type: integer
                  description: Revision number (store-specific)
                title:
                  type: string
                  description: Tiddler title
                creator:
                  type: string
                  description: Creator of the tiddler
                created:
                  type: string
                  description: Creation timestring (YYYYMMDDHHMMSS format)
                modifier:
                  type: string
                  description: Last modifier of the tiddler
                modified:
                  type: string
                  description: Modification timestring (YYYYMMDDHHMMSS format)
                tags:
                  type: array
                  items:
                    type: string
                  description: List of tags
                type:
                  type: string
                  nullable: true
                  description: Content type of the tiddler (null if default wikitext)
                fields:
                  type: object
                  description: Extended (custom) fields on the tiddler
                  additionalProperties:
                    type: string
                bag:
                  type: string
                  description: Name of the bag containing this tiddler
                recipe:
                  type: string
                  nullable: true
                  description: Name of the recipe (null if accessed via bag)
                permissions:
                  type: array
                  items:
                    type: string
                  description: Permissions the current user has on this tiddler
                uri:
                  type: string
                  format: uri
                  description: URI to this revision of the tiddler
              required:
                - revision
                - title
                - creator
                - created
                - modifier
                - modified
                - tags
                - type
                - fields
                - bag
                - recipe
                - permissions
                - uri
    '404':
      $ref: ../components/responses/404NotFound.yaml
post:
  summary: Post revisions to a tiddler
  description: Create new revisions for a tiddler (chronicle)
  operationId: postBagTiddlerRevisions
  parameters:
    - name: bag_name
      in: path
      required: true
      schema:
        type: string
    - name: tiddler_name
      in: path
      required: true
      schema:
        type: string
    - $ref: ../components/parameters/IfMatch.yaml
  requestBody:
    required: true
    content:
      application/vnd.tiddlyweb+json:
        schema:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
  responses:
    '204':
      description: Revisions created successfully
      headers:
        Location:
          $ref: ../components/headers/Location.yaml
    '400':
      $ref: ../components/responses/400BadRequest.yaml
    '403':
      $ref: ../components/responses/403Forbidden.yaml
    '409':
      $ref: ../components/responses/409Conflict.yaml
    '412':
      $ref: ../components/responses/412PreconditionFailed.yaml
    '415':
      $ref: ../components/responses/415UnsupportedMediaType.yaml
