get:
  summary: Search for tiddlers
  operationId: searchTiddlers
  parameters:
    - name: q
      in: query
      required: true
      description: Search query
      schema:
        type: string
    - $ref: ../components/parameters/SelectParam.yaml
    - $ref: ../components/parameters/SortParam.yaml
    - $ref: ../components/parameters/LimitParam.yaml
  responses:
    '200':
      description: Search results
      content:
        text/plain:
          schema:
            type: array
            items:
              type: string
        text/html:
          schema:
            type: string
        application/vnd.tiddlyweb+json:
          schema:
            type: array
            items:
              type: object
              properties:
                title:
                  type: string
                revision:
                  type: string
                bag:
                  type: string
    '400':
      $ref: ../components/responses/400BadRequest.yaml
