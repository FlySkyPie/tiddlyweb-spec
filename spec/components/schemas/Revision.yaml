type: object
description: >
  A Revision is a historical snapshot (version) of a tiddler at a specific point
  in time. Each revision preserves the complete state of a tiddler — its text,
  metadata, and extended fields — as it existed when that version was saved.

  Revisions are ordered sequentially: the first revision represents the tiddler's
  initial creation, and each subsequent revision records the state after an
  update. The latest revision (highest revision number) is the current state of
  the tiddler.

  The revision identifier format is store-specific (e.g., an integer for the
  text store, a hash for other stores). It is used for optimistic concurrency
  control via the `If-Match` header.
properties:
  revision:
    type: integer
    description: Revision number (store-specific)
  title:
    type: string
    description: Tiddler title
  creator:
    type: string
    description: Creator of the tiddler
  created:
    type: string
    pattern: '^\d{14}$'
    description: Creation timestring (YYYYMMDDHHMMSS format)
  modifier:
    type: string
    description: Last modifier of the tiddler
  modified:
    type: string
    pattern: '^\d{14}$'
    description: Modification timestring (YYYYMMDDHHMMSS format)
  tags:
    type: array
    items:
      type: string
    description: List of tags
  type:
    type: string
    nullable: true
    description: Content type of the tiddler (null if default wikitext)
  fields:
    type: object
    description: Extended (custom) fields on the tiddler
    additionalProperties:
      type: string
  bag:
    type: string
    description: Name of the bag containing this tiddler
  recipe:
    type: string
    nullable: true
    description: Name of the recipe (null if accessed via bag)
  permissions:
    type: array
    items:
      type: string
    description: Permissions the current user has on this tiddler
  uri:
    type: string
    format: uri
    description: URI to this revision of the tiddler
required:
  - revision
  - title
  - creator
  - created
  - modifier
  - modified
  - tags
  - type
  - fields
  - bag
  - recipe
  - permissions
  - uri