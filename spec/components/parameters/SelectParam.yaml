name: select
in: query
description: >
  Filter by matching an attribute value. Syntax: `attribute:value`,
  `attribute:!value` (not equal),

  `attribute:>value` (greater than), `attribute:<value` (less than).

  Supported special attributes: `tag`, `text`, `field`, `rbag`.
schema:
  type: string
  pattern: ^\w+:[!><]?.+$
  examples:
    - select=tag:systemConfig
    - select=title:!Welcome
    - select=modified:>20260101000000
